<!DOCTYPE html>
<html lang="uk">
  <head>
    <title>Реєстрація на курс</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <body>
    <h1>Реєстрація на курс</h1>
    <form>
    <fieldset><br>
    
        <legend>Контактні дані</legend>

        <label for="name">Ім'я:</label>
        <input type="text" id="name" name="name" minlength="1" required><br><br>

        <label for="surname">Прізвище:</label>
        <input type="text" id="surname" name="surname" minlength="1" required><br><br>

        <label for="email">Електронна пошта:</label>
        <input type="email" id="email" name="email" placeholder="example@gmail.com" required><br><br>

        <label for="date">Дата народження:</label>
        <input type="date" id="date" name="date" required><br><br>

        <label for="Спеціальність">Спеціальність:</label>
        <select name="Спеціальність" id="Спеціальність" required>
          <option value="Інженерія програмного забезпечення">Інженерія програмного забезпечення</option>
          <option value="Комп'ютерні науки">Комп'ютерні науки</option>
          <option value="Кібербезпека">Кібербезпека</option>
        </select><br><br>
    </fieldset><br><br>

    <fieldset><br> 
        <legend> Вхідні дані </legend>
        <label for="password">Пароль (мінімум 8 символів):</label>
        <input type="password" id="password" name="password" required minlength="8"><br><br>

        <label for="password-verification">Підтвердження пароля (мінімум 8 символів):</label>
        <input type="password" id="password-verification" name="password-verification" required minlength="8"><br><br>

        <label for="terms">Я погоджуюся з умовами використання</label>
        <input type="checkbox" id="terms" name="terms" required><br><br>
        
    </fieldset><br>
    
      <button type="submit">Відправити</button>
    </form>
    

  </body>
</html>
